name: Update Topic Radar

on:
  workflow_dispatch:
  schedule:
    # UTC 23:07-15:07 对应北京时间 07:07-23:07，每小时更新一次
    - cron: '7 23,0-15 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update radar data
        env:
          # 可选：在 Settings → Secrets and variables → Actions → Variables 中配置 RSSHUB_BASE
          # 例如使用自建 RSSHub：https://rsshub.example.com
          RSSHUB_BASE: ${{ vars.RSSHUB_BASE }}
        run: npm run update

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
